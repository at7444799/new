name: Auto Post AI Influencer

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "What to post?"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - morning_photo
          - evening_photo
          - reel

  schedule:
    # GitHub Actions cron runs in UTC.
    # These are converted from Indian Standard Time.

    # Morning photo: 7:00 AM India time
    - cron: "30 1 * * *"

    # Reel 1: 10:30 AM India time
    - cron: "0 5 * * *"

    # Reel 2: 1:30 PM India time
    - cron: "0 8 * * *"

    # Reel 3: 5:00 PM India time
    - cron: "30 11 * * *"

    # Evening photo: 7:30 PM India time
    - cron: "0 14 * * *"

    # Reel 4: 10:00 PM India time
    - cron: "30 16 * * *"

permissions:
  contents: write

concurrency:
  group: auto-post-ai-influencer
  cancel-in-progress: false

jobs:
  auto-post:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Kolkata

      FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
      IG_USER_ID: ${{ secrets.IG_USER_ID }}

      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      NVIDIA_MODEL: ${{ secrets.NVIDIA_MODEL }}
      NVIDIA_VISION_MODEL: ${{ secrets.NVIDIA_VISION_MODEL }}

      MANUAL_MODE: ${{ github.event.inputs.mode || 'auto' }}

      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_REF_NAME: ${{ github.ref_name }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Show trigger and time
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Manual mode: $MANUAL_MODE"
          echo "Branch: $GITHUB_REF_NAME"
          echo "UTC time:"
          date -u
          echo "India time:"
          date

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm install

      - name: Check and create required folders
        run: |
          mkdir -p media/reels
          mkdir -p media/morning
          mkdir -p media/evening
          mkdir -p media/music
          mkdir -p media/videos
          mkdir -p media/weekend
          mkdir -p media/posted
          mkdir -p data

          echo "Media folder structure:"
          find media -maxdepth 3 -type f | sort || true

          echo "Reels files:"
          ls -la media/reels || true

          echo "Music files:"
          ls -la media/music || true

      - name: Prepare content
        run: npm run auto-post:prepare

      - name: Commit prepared content
        run: |
          git config user.name "ai-influencer-bot"
          git config user.email "actions@github.com"

          git status

          git add -A media data

          if git diff --cached --quiet; then
            echo "No prepared content changes to commit"
          else
            git commit -m "Prepare influencer content"
            git push origin HEAD:"$GITHUB_REF_NAME"
          fi

      - name: Wait for GitHub raw files
        run: sleep 35

      - name: Publish content
        run: npm run auto-post:publish

      - name: Commit cleanup and history
        if: always()
        run: |
          git config user.name "ai-influencer-bot"
          git config user.email "actions@github.com"

          git status

          git add -A media data

          if git diff --cached --quiet; then
            echo "No cleanup/history changes to commit"
          else
            git commit -m "Clean posted media and update history"
            git push origin HEAD:"$GITHUB_REF_NAME"
          fi
