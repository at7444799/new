name: Auto Post AI Influencer

on:
  workflow_dispatch:
    inputs:
      slot:
        description: "Post type"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - morning
          - evening
          - weekend

  schedule:
    # Morning post: 8:30 AM India time
    - cron: "0 3 * * *"

    # Evening post: 8:30 PM India time
    - cron: "0 15 * * *"

    # Weekend post: Saturday/Sunday 11:00 AM India time
    - cron: "30 5 * * 6,0"

permissions:
  contents: write

jobs:
  auto-post:
    runs-on: ubuntu-latest

    env:
      FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
      IG_USER_ID: ${{ secrets.IG_USER_ID }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      NVIDIA_MODEL: ${{ secrets.NVIDIA_MODEL }}
      MANUAL_SLOT: ${{ github.event.inputs.slot }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_REF_NAME: ${{ github.ref_name }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run auto poster
        run: npm run auto-post

      - name: Commit deleted posted images and history
        run: |
          git config user.name "ai-influencer-bot"
          git config user.email "actions@github.com"
          git add media data || true
          git commit -m "Remove posted media and update history" || echo "No changes to commit"
          git push
